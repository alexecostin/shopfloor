services:
  postgres:
    image: postgres:16-alpine
    container_name: shopfloor-postgres
    environment:
      POSTGRES_DB: shopfloor
      POSTGRES_USER: shopfloor
      POSTGRES_PASSWORD: shopfloor_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopfloor -d shopfloor"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
